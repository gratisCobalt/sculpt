name: "CodeQL config"

# Exclude paths that are not part of the deployed application:
# - .agent/      vendored third-party Claude Code agent skills (Python)
# - scripts/     local dev-only data fetch / import scripts, not shipped
# - ios/         Capacitor shell, no security-relevant native Swift
# - dist/        build output
# - node_modules vendored deps
paths-ignore:
  - .agent
  - scripts
  - ios
  - dist
  - node_modules

queries:
  - uses: security-extended
  - uses: security-and-quality
